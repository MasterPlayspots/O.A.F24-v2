name: Docs Check

# Blocks PRs when:
#   - docs/API.md is out of sync with worker/src/routes/**
#   - a new migration is missing its rollback companion
# Pinned to commit SHAs (F-014).

on:
  pull_request:
    branches: [main]

jobs:
  docs-freshness:
    name: API docs + migration rollback pairs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Regenerate docs/API.md
        run: npm run docs:api

      - name: Fail if docs/API.md is stale
        run: |
          if ! git diff --quiet docs/API.md; then
            echo "::error file=docs/API.md::docs/API.md is out of sync. Run 'npm run docs:api' locally and commit the result."
            git --no-pager diff docs/API.md | head -40
            exit 1
          fi

      - name: Require rollback companion for every migration
        run: |
          # Only numbered migrations (NNN- or NNNa-) need a rollback pair.
          # schema.sql is a reference dump, not a real migration.
          missing=0
          for f in worker/db/migrations/*.sql; do
            base_name=$(basename "$f")
            case "$base_name" in
              *-rollback.sql) continue ;;
              [0-9][0-9][0-9]-*|[0-9][0-9][0-9][a-z]-*) ;;
              *) continue ;;
            esac
            base="${f%.sql}"
            rollback="${base}-rollback.sql"
            if [ ! -f "$rollback" ]; then
              echo "::error file=$f::Missing rollback companion: $rollback"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing migration(s) missing a *-rollback.sql companion. See docs/MIGRATIONS.md."
            exit 1
          fi
