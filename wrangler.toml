name = "foerdermittel-check-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
API_VERSION = "3.1.0"
ENVIRONMENT = "production"

[[d1_databases]]
binding = "CHECK_DB"
database_name = "foerdermittel-checks"
database_id = "0b2479a3-13eb-45bc-8c71-105208ed71ad"

[[d1_databases]]
binding = "FOERDER_DB"
database_name = "foerderprogramme"
database_id = "b95adb7b-ed86-441b-841e-4cd3a9a15135"

[[d1_databases]]
binding = "PLATFORM_DB"
database_name = "bafa_antraege"
database_id = "8582e9dd-8063-4dbd-b079-f38b2bb3918f"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "foerdermittel-check-docs"

[ai]
binding = "AI"

# Secrets (set via wrangler secret put):
# JWT_SECRET - shared with other workers
# EXTERNAL_AI_KEY - OpenAI or Anthropic API key
# EXTERNAL_AI_PROVIDER - "openai" or "anthropic"
