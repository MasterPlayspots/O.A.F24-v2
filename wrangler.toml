name = "bafa-creator-ai-worker"
main = "dist/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Account ID
# Find this in the Cloudflare Dashboard: https://dash.cloudflare.com
# → Select your account → copy the Account ID from the URL or Overview page.
# Alternatively, set the CLOUDFLARE_ACCOUNT_ID environment variable.
# account_id = "your-cloudflare-account-id"

[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
FRONTEND_URL = "https://zfbf.info"

# D1 Databases
[[d1_databases]]
binding = "DB"
database_name = "zfbf-db"
database_id = "6b06bad2-a074-4280-ae26-14d2057893e6"

[[d1_databases]]
binding = "BAFA_DB"
database_name = "bafa_antraege"
database_id = "8582e9dd-0000-0000-0000-000000000000"
# NOTE: Replace database_id with the actual ID from `wrangler d1 create bafa_antraege`
# or from Cloudflare Dashboard → Workers & Pages → D1 → bafa_antraege

[[d1_databases]]
binding = "BAFA_CONTENT"
database_name = "bafa_learnings"
database_id = "7f5947f7-42af-455e-81ad-0c57be23b940"

# KV Namespaces
[[kv_namespaces]]
binding = "SESSIONS"
id = "8cb1b5aa11e94d8fb8e9c0a2d3e4f5a6"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "2fddaa5f22c04e9fa8b9c0a2d3e4f5b6"

[[kv_namespaces]]
binding = "CACHE"
id = "2edc5ca833d14fa9b8c9d0a2d3e4f5c6"

[[kv_namespaces]]
binding = "WEBHOOK_EVENTS"
id = "3abc6db944e25gb0c9d0e1b3e4f5d7e8"

# R2 Bucket
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "bafa-reports"

# AI Binding
[ai]
binding = "AI"

# Cron Triggers
# Daily backup at 02:00 UTC + Weekly learning cycle Monday 03:00 UTC
[triggers]
crons = ["0 2 * * *", "0 3 * * 1"]

# Secrets (set via: wrangler secret put <NAME>)
# JWT_SECRET
# UNLOCK_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# PAYPAL_CLIENT_ID
# PAYPAL_CLIENT_SECRET
# RESEND_API_KEY
