function groupKey(r) {
  if (r.startsWith('app/')) return 'Error Boundaries';
  if (r === '/') return 'Public';
  if (r.startsWith('/dashboard/berater')) return 'Dashboard · Berater';
  if (r.startsWith('/dashboard/unternehmen')) return 'Dashboard · Unternehmen';
  if (r.startsWith('/admin')) return 'Admin';
  if (r.startsWith('/foerdercheck')) return 'Protected · Fördercheck (auth)';
  if (r.startsWith('/onboarding')) return 'Protected · Onboarding';
  if (r.startsWith('/antraege')) return 'Protected · Anträge';
  if (r.startsWith('/foerder-schnellcheck')) return 'Public · Fördercheck (anon)';
  if (r.startsWith('/berater')) return 'Public · Berater';
  if (r.startsWith('/programme')) return 'Public · Programme';
  if (r.startsWith('/aktuelles')) return 'Public · Aktuelles';
  if (['/login', '/registrieren', '/verifizieren', '/passwort-vergessen', '/passwort-reset'].includes(r)) return 'Auth';
  return 'Public · Other';
}

function renderTree() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter').value;
  const tree = document.getElementById('tree');
  const groups = {};
  DATA.pages.forEach(p => {
    // filter
    if (f === 'public' && p.protected) return;
    if (f === 'protected' && !p.protected) return;
    if (f === 'dashboard' && !p.route.startsWith('/dashboard')) return;
    if (f === 'admin' && !p.route.startsWith('/admin')) return;
    if ((f === 'red' || f === 'yellow' || f === 'green') && p.status !== f) return;
    if (f === 'orphan' && !p.orphan) return;
    // search
    if (q) {
      const hay = [
        p.route, p.file, p.title, p.persona,
        ...(p.flags || []),
        ...(p.ctas || []).map(c => (c.label || '') + ' ' + (c.target || '')),
        ...(p.findings || []).map(x => (x.summary || '') + ' ' + (x.id || ''))
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return;
    }
    const g = groupKey(p.route);
    (groups[g] = groups[g] || []).push(p);
  });
  const order = [
    'Public', 'Public · Programme', 'Public · Berater', 'Public · Fördercheck (anon)',
    'Public · Aktuelles', 'Public · Other',
    'Auth',
    'Protected · Onboarding', 'Protected · Fördercheck (auth)', 'Protected · Anträge',
    'Dashboard · Unternehmen', 'Dashboard · Berater', 'Admin',
    'Error Boundaries'
  ];
  let html = '';
  for (const g of order) {
    const rows = groups[g];
    if (!rows) continue;
    html += `<div class="group-header">${g} · ${rows.length}</div>`;
    rows.forEach(p => {
      const cls = `node${p.route === current ? ' active' : ''}`;
      html += `<div class="${cls}" data-route="${encodeURIComponent(p.route)}"><span class="dot ${p.status}"></span><span class="route">${p.route}</span><span class="persona">${p.persona}</span></div>`;
    });
  }
  tree.innerHTML = html || '<div style="padding:20px; color:var(--muted)">No matches.</div>';
  tree.querySelectorAll('.node').forEach(n => n.addEventListener('click', () => {
    current = decodeURIComponent(n.dataset.route);
    renderTree();
    renderDetail(current);
  }));
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

let current = '/';

function renderDetail(route) {
  const p = DATA.pages.find(x => x.route === route);
  const main = document.getElementById('detail');
  if (!p) {
    // Landing view
    main.innerHTML = renderLanding();
    return;
  }
  const chip = p.status;
  let html = `<h2 class="detail-title"><span class="chip ${chip}">${chip}</span>${escapeHtml(p.route)}</h2>`;
  html += `<div class="detail-meta">`;
  html += `<code>${escapeHtml(p.file)}</code> · persona: <b>${escapeHtml(p.persona)}</b> · liveStatus: <b>${escapeHtml(p.liveStatus)}</b>`;
  if (p.orphan) html += ` · <span class="chip yellow">orphan</span>`;
  if (p.protected) html += ` · <span class="chip blue">protected</span>`;
  html += `</div>`;
  html += `<div class="detail-meta">Title: ${escapeHtml(p.title)} · hasMetadata: ${p.hasMetadata ? '✓' : '✗'}</div>`;

  if ((p.findings || []).length) {
    html += `<div class="section"><h3>Findings (${p.findings.length})</h3>`;
    p.findings.forEach(f => {
      const sev = f.severity || 'low';
      const col = sev === 'critical' ? 'red' : sev === 'high' ? 'red' : sev === 'medium' ? 'yellow' : 'grey';
      html += `<div class="card ${col}"><h4><span class="chip ${col}">${sev}</span>${escapeHtml(f.id || '')} <span style="font-weight:400;color:var(--muted)">· phase ${f.phase}</span></h4><div>${escapeHtml(f.summary)}</div></div>`;
    });
    html += `</div>`;
  }

  if ((p.ctas || []).length) {
    html += `<div class="section"><h3>CTAs (${p.ctas.length})</h3><div class="card">`;
    html += `<div class="cta-row" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;"><span>Label</span><span>Target</span><span>Type</span><span>Status</span></div>`;
    p.ctas.forEach(c => {
      const sCol = c.status === 'live' ? 'green' : c.status === 'broken' ? 'red' : c.status === 'mock' ? 'yellow' : 'grey';
      html += `<div class="cta-row"><span class="label">${escapeHtml(c.label)}</span><span class="target" title="${escapeHtml(c.target)}">${escapeHtml(c.target)}</span><span class="type">${escapeHtml(c.type)}</span><span class="status chip ${sCol}">${escapeHtml(c.status)}</span></div>`;
    });
    html += `</div></div>`;
  }

  if ((p.outgoing_links || []).length) {
    html += `<div class="section"><h3>Outgoing links (${p.outgoing_links.length})</h3><div class="card"><ul class="links-list">`;
    p.outgoing_links.forEach(l => {
      html += `<li>${escapeHtml(l)}</li>`;
    });
    html += `</ul></div></div>`;
  }

  if ((p.incoming_links || []).length) {
    html += `<div class="section"><h3>Incoming (${p.incoming_links.length})</h3><div class="card"><ul class="links-list">`;
    p.incoming_links.forEach(l => {
      html += `<li>${escapeHtml(l)}</li>`;
    });
    html += `</ul></div></div>`;
  } else if (!['/'].includes(p.route)) {
    html += `<div class="section"><h3>Incoming</h3><div class="empty">No incoming link from any scanned component (orphan page).</div></div>`;
  }

  main.innerHTML = html;
}

  DATA.top10.forEach(b => {
    h += `<li><span class="id">${escapeHtml(b.id)}</span> · <b>${escapeHtml(b.area)}</b> — ${escapeHtml(b.fix)}</li>`;
  });
  h += '</ol></div></div>';

  h += '<div class="section"><h3>Workers</h3>';
  DATA.workers.forEach(w => {
    h += `<div class="card"><h4>${escapeHtml(w.name)}</h4><div class="detail-meta"><code>${escapeHtml(w.prodRoute)}</code></div><div>Endpoints: <b>${escapeHtml(w.endpointCount)}</b> · Bindings: ${escapeHtml(w.bindings)}</div></div>`;
  });
  h += '</div>';

  h += '<div class="section"><h3>Databases (5)</h3>';

}
