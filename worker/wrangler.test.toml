name = "bafa-creator-ai-worker-test"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "test"
API_VERSION = "v1"
FRONTEND_URL = "http://localhost:3000"

# D1 Databases
[[d1_databases]]
binding = "DB"
database_name = "zfbf-db-test"
database_id = "test-db-id"

[[d1_databases]]
binding = "BAFA_DB"
database_name = "bafa-antraege-test"
database_id = "test-bafa-antraege-id"

[[d1_databases]]
binding = "BAFA_CONTENT"
database_name = "bafa-learnings-test"
database_id = "test-bafa-content-id"

[[d1_databases]]
binding = "FOERDER_DB"
database_name = "foerderprogramme-test"
database_id = "test-foerder-db-id"

# KV Namespaces
[[kv_namespaces]]
binding = "SESSIONS"
id = "test-sessions-id"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "test-rate-limit-id"

[[kv_namespaces]]
binding = "CACHE"
id = "test-cache-id"

[[kv_namespaces]]
binding = "WEBHOOK_EVENTS"
id = "test-webhook-events-id"

# R2 Bucket
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "bafa-reports-test"
